<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload a Photo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <style>
    :root {
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.12);
      --text: #e5e7eb;
      --text-muted: #9ca3af;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #020617;
      font-family: -apple-system, system-ui, sans-serif;
      color: var(--text);
    }

    .screen {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 22px 20px 10px;
      text-align: center;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Form that fills the middle area */
    .upload-form {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Big tappable label */
    .tap-area {
      flex: 1;
      margin: 16px;
      border-radius: 24px;
      border: 2px dashed rgba(148,163,184,0.25);
      background: radial-gradient(circle at top left, var(--accent-soft), #020617);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      cursor: pointer;
    }

    .camera-icon {
      font-size: 56px;
      margin-bottom: 14px;
    }

    .tap-text {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .tap-helper {
      font-size: 14px;
      color: var(--text-muted);
    }

    .footer {
      text-align: center;
      padding: 10px;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Visually hide the input but keep it associated with the label */
    #photoInput {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }
  </style>
</head>

<body>
  <div class="screen">
    <div class="header">
      <div class="title">Upload multi-page document</div>
      <div class="subtitle">Take one photo per page. All pages will be uploaded together.</div>
    </div>

    <!-- Previews container -->
    <div id="previews" class="previews-container">
    </div>

    <div id="error">
    </div>

    <!-- Tap area to open camera (one page at a time) -->
    <div id="tapArea" class="tap-area">
      <div class="camera-icon">📷</div>
      <div class="tap-text" id="tapText">Tap to take photo of page 1</div>
      <div class="tap-helper">Photos are saved locally until you upload</div>
    </div>

    <!-- Hidden file input (single capture, reused) -->
    <input
      id="photoInput"
      type="file"
      accept="image/*"
      capture="environment"
      style="display: none;"
    />

    <div class="footer">
      <button id="uploadBtn" class="upload-button" style="display: none;">
        Upload all <span id="pageCount">1</span> pages
      </button>
      <div id="status">Your photos stay on your phone until you tap “Upload all”</div>
    </div>
  </div>

  <script>
    const photoInput = document.getElementById("photoInput");
    const tapArea = document.getElementById("tapArea");
    const tapText = document.getElementById("tapText");
    const previewsContainer = document.getElementById("previews");
    const uploadBtn = document.getElementById("uploadBtn");
    const pageCountSpan = document.getElementById("pageCount");
    const errorContainer = document.getElementById("error");

    let files = [];          // Array of File objects
    let nextPageNumber = 1;

    // Trigger camera when user taps the big area
    tapArea.addEventListener("click", () => {
      photoInput.click();
    });

    // When a photo is taken
    photoInput.addEventListener("change", () => {
      if (photoInput.files && photoInput.files.length > 0) {
        const file = photoInput.files[0];
        files.push(file);

        // Create thumbnail preview
        const previewHTML = `
          <div class="preview-item">
            <div class="page-label">Page ${nextPageNumber}</div>
            <img src="${URL.createObjectURL(file)}" alt="Page ${nextPageNumber}">
            <button class="remove-btn" data-index="${files.length - 1}">Remove</button>
          </div>`;
        previewsContainer.innerHTML += previewHTML;

        // Reset input so it can be used again for the next photo
        photoInput.value = "";

        nextPageNumber++;
        tapText.textContent = `Tap to take photo of page ${nextPageNumber}`;
        pageCountSpan.textContent = files.length;
        uploadBtn.style.display = "block";
      }
    });

    // Remove a photo (event delegation)
    previewsContainer.addEventListener("click", (e) => {
      if (e.target.classList.contains("remove-btn")) {
        const index = parseInt(e.target.dataset.index, 10);
        files.splice(index, 1);

        // Re-render all previews (simple & safe)
        renderPreviews();
      }
    });

    function renderPreviews() {
      previewsContainer.innerHTML = "";
      nextPageNumber = 1;

      files.forEach((file, idx) => {
        const previewHTML = `
          <div class="preview-item">
            <div class="page-label">Page ${nextPageNumber}</div>
            <img src="${URL.createObjectURL(file)}" alt="Page ${nextPageNumber}">
            <button class="remove-btn" data-index="${idx}">Remove</button>
          </div>`;
        previewsContainer.innerHTML += previewHTML;
        nextPageNumber++;
      });

      pageCountSpan.textContent = files.length;
      tapText.textContent = `Tap to take photo of page ${nextPageNumber}`;
      uploadBtn.style.display = files.length > 0 ? "block" : "none";
    }

    // Upload all photos together
    uploadBtn.addEventListener("click", async () => {
      if (files.length === 0) return;

      const formData = new FormData();
      files.forEach(file => {
        formData.append("file", file);   // Same part name "file" — Mule receives all as a list
      });

      uploadBtn.textContent = "Uploading...";
      uploadBtn.disabled = true;

      try {
        let url = "https://agent-network-ingress-gw-1yk5ce.at3f2p.usa-e2.cloudhub.io/missouri-professional-registration/mo-proreg";
        const response = await fetch(url, {
          method: "POST",
          body: formData,
          headers: {
              Accept: "application/json"
          }
        });
        if (response.ok) {
          window.location.href = "/missouri-professional-registration/confirmation.html";
        } else {
          const errorText = await response.text();   // get whatever Mule returned
          const errorHTML = `
            <div style="color:red; padding:20px; background:#ffebee; margin:10px;">
              Upload failed!<br>
              Status: ${response.status}<br>
              Message from server: ${errorText || 'No details'}
            </div>`;
          errorContainer.innerHTML += errorHTML;
            uploadBtn.textContent = `Upload all ${files.length} pages`;
            uploadBtn.disabled = false;
          }
      } catch (err) {
        const errorHTML = `
          <div style="color:red; padding:20px; background:#ffebee; margin:10px;">
            Network / Browser Error<br>
            Message: ${err.message}<br>
            (Check your internet and ngrok URL)
          </div>`;
        errorContainer.innerHTML += errorHTML;
        
        alert("Network error on phone!\nDetails: " + err.message + "\n\nPossible causes:\n1. CORS not enabled in Mule\n2. ngrok connection dropped\n3. PDF too large");
        uploadBtn.textContent = `Upload all ${files.length} pages`;
        uploadBtn.disabled = false;
      }
    });
  </script>

  <!-- Optional minimal CSS you can add to your existing stylesheet -->
  <style>
    .previews-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 20px 10px;
      background: #f9f9f9;
      border-radius: 8px;
      margin: 10px 15px;
    }
    .preview-item {
      position: relative;
      width: 100px;
      text-align: center;
    }
    .preview-item img {
      width: 100%;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .page-label {
      font-size: 0.8rem;
      margin-bottom: 4px;
      font-weight: bold;
    }
    .remove-btn {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 12px;
      cursor: pointer;
    }
    .upload-button {
      background: #007bff;
      color: white;
      border: none;
      padding: 14px 24px;
      font-size: 1.1rem;
      border-radius: 8px;
      width: 90%;
      margin: 10px auto;
      display: block;
    }
  </style>
</body>
</html>
